<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBP AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* হেডার সেকশন */
        .header {
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #00ff00;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .header h2 {
            color: #00ff00;
            font-size: 20px;
        }
        /* চ্যাট বক্স এরিয়া */
        .chat-container {
            flex: 1;
            padding: 20px;
            margin-top: 60px;
            margin-bottom: 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
        }
        .bot {
            background-color: #262626;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 4px solid #00ff00;
        }
        .user {
            background-color: #00ff00;
            color: #000;
            font-weight: bold;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .error {
            background-color: #331a1a;
            color: #ff3333;
            border-left: 4px solid #ff3333;
            align-self: flex-start;
        }
        /* ইনপুট বক্স সেকশন - যা সবসময় নিচে ফিক্সড থাকবে */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        .input-container input {
            flex: 1;
            background-color: #262626;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        .input-container input:focus {
            border-color: #00ff00;
        }
        .input-container button {
            background-color: #00ff00;
            border: none;
            color: #000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>TBP AI Assistant</h2>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            হ্যালো ভাই! আমি Toxic Black Python-এর পার্সোনাল এআই। যেকোনো হেল্পের জন্য আমাকে জিজ্ঞেস করতে পারো!
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">➔</button>
    </div>

    <script>
        let isUnlocked = false;

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const inputField = document.getElementById('userInput');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            // ইউজারের মেসেজ স্ক্রিনে দেখানো
            appendMessage(messageText, 'user');
            inputField.value = '';

            setTimeout(() => {
                // পাসওয়ার্ড চেক
                if (!isUnlocked) {
                    if (messageText === 'tbp2026') {
                        isUnlocked = true;
                        appendMessage('ধন্যবাদ ভাই! তোমার TBP AI Assistant সফলভাবে আনলক হয়েছে। এখন তুমি আমাকে যেকোনো প্রশ্ন করতে পারো!', 'bot');
                    } else {
                        appendMessage('সার্ভার থেকে রেসপন্স পাওয়া যায়নি ভাই। আগে সঠিক সিক্রেট কোড দিয়ে আনলক করুন!', 'error');
                    }
                } else {
                    // আনলক হওয়ার পর এআই-এর আসল রেসপন্স (এখানে তোমার ফায়ারবেস বা এপিআই কানেকশন বসাতে পারো)
                    if(messageText.toLowerCase().includes('diamond') || messageText.toLowerCase().includes('দাম')) {
                        appendMessage('আশরাফুল ভাই, আমাদের TBP Shop-এ ১০০ ডায়মন্ডের দাম এখন মাত্র ৮০ টাকা! অর্ডার করতে চাইলে আইডি কোড দাও।', 'bot');
                    } else {
                        appendMessage('আমি তোমার মেসেজটি পেয়েছি ভাই! ফায়ারবেস ডাটাবেস সিঙ্ক হলেই আমি এটার ফুল ডিটেইলস উত্তর দিতে পারব।', 'bot');
                    }
                }
            }, 600);
        }

        function appendMessage(text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // অটো স্ক্রল ডাউন
        }
    </script>
</body>
</html>
