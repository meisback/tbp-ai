<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBP AI Mobile Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* পাসওয়ার্ড স্ক্রিন */
        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .lock-card { background: #1e1e1e; padding: 30px 20px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .lock-card h2 { color: #00ff00; font-size: 24px; margin-bottom: 15px; letter-spacing: 1px; }
        .lock-card p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .lock-card input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 16px; text-align: center; outline: none; margin-bottom: 15px; }
        .lock-card input:focus { border-color: #00ff00; }
        .lock-card button { width: 100%; padding: 12px; border-radius: 8px; background: #00ff00; color: #000; font-size: 16px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .lock-card button:active { transform: scale(0.98); }
        #error-msg { color: #ff3333; font-size: 14px; margin-top: 10px; font-weight: bold; }

        /* মেইন চ্যাট স্ক্রিন */
        #main-chat { display: none; flex-direction: column; height: 100vh; width: 100%; }
        .app-header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 1px solid #333; font-size: 20px; font-weight: bold; color: #00ff00; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; background: #0f0f0f; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.bot { background: #262626; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid #00ff00; }
        .msg.user { background: #00ff00; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .msg.status { background: transparent; color: #888; align-self: center; font-style: italic; font-size: 13px; }

        .input-area { background: #1a1a1a; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        .input-area input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #262626; color: #fff; font-size: 15px; outline: none; padding-left: 18px; }
        .input-area input:focus { border-color: #00ff00; }
        .input-area button { background: #00ff00; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-card">
      <h2>TBP AI LOCK</h2>
      <p>অ্যাসিস্ট্যান্ট আনলক করতে সিক্রেট কোড দিন</p>
      <input type="password" id="secret-code" placeholder="••••••••" autofocus>
      <button id="login-btn">Unlock App</button>
      <p id="error-msg" style="display: none;">ভুল কোড! আবার চেষ্টা করো।</p>
    </div>
  </div>

  <div id="main-chat">
    <div class="app-header">TBP AI Assistant</div>
    <div id="chat-box" class="chat-container">
      <div class="msg bot">হ্যালো ভাই! আমি Toxic Black Python-এর পার্সোনাল এআই। যেকোনো হেল্পের জন্য আমাকে জিজ্ঞেস করতে পারো!</div>
    </div> 

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type a message...">
      <button id="send-btn">➔</button>
    </div>
  </div>

  <script>
    // তোমার দেওয়া এপিআই কি ও সিক্রেট পাসওয়ার্ড
    const API_KEY = "AQ.Ab8RN6KyjZ_yGwL6CJdf2hhd85njr714Bcj8gYcgosTbRBc-Bg";
    const CORRECT_PASSWORD = "tbp2026"; 

    const lockScreen = document.getElementById('lock-screen');
    const mainChat = document.getElementById('main-chat');
    const secretCodeInput = document.getElementById('secret-code');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    loginBtn.addEventListener('click', function() {
      if (secretCodeInput.value === CORRECT_PASSWORD) {
        lockScreen.style.display = "none";
        mainChat.style.display = "flex";
      } else {
        errorMsg.style.display = "block";
        secretCodeInput.value = "";
      }
    });

    secretCodeInput.addEventListener("keyup", function(event) {
      if (event.key === "Enter") { loginBtn.click(); }
    });

    const sendBtn = document.getElementById('send-btn');
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box'); 

    sendBtn.addEventListener('click', async function() {
      const messageText = userInput.value.trim();
      if (messageText === "") return;

      chatBox.innerHTML += `<div class="msg user">${messageText}</div>`;
      userInput.value = ""; 
      chatBox.scrollTop = chatBox.scrollHeight;

      const typingId = "typing-" + Date.now();
      chatBox.innerHTML += `<div id="${typingId}" class="msg status">TBP AI লিখছে...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        // ফিক্সড ইউআরএল স্ট্রাকচার (v1beta এবং সঠিক মডেল পাথ)
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: messageText }] }] })
        });

        const data = await response.json();
        if (document.getElementById(typingId)) document.getElementById(typingId).remove();

        if (data && data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
          const aiReply = data.candidates[0].content.parts[0].text;
          chatBox.innerHTML += `<div class="msg bot">${aiReply}</div>`;
        } else {
          chatBox.innerHTML += `<div class="msg bot" style="color:red;">সার্ভার থেকে রেসপন্স পাওয়া যায়নি ভাই।</div>`;
        }
      } catch (error) {
        if (document.getElementById(typingId)) document.getElementById(typingId).remove();
        chatBox.innerHTML += `<div class="msg bot" style="color:red;">কানেকশন এরর ভাই। নেটওয়ার্ক চেক করো।</div>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    userInput.addEventListener("keyup", function(event) {
      if (event.key === "Enter") { sendBtn.click(); }
    });
  </script>
</body>
</html>
